<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DXF / SVG → Z 轴 G-code</title>
</head>
<body style="margin:24px;background:#eef2f6;font-family:system-ui,sans-serif;color:#17202a">
  <section style="max-width:1100px;margin:0 auto 16px;padding:14px 16px;background:#fff;border:1px solid #d8dee4;border-radius:8px">
    <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center">
      <strong>ESP32 控制</strong>
      <span id="deviceUrl">设备地址读取中...</span>
      <button id="sendJob" type="button" disabled>发送 G-code</button>
      <button data-action="start" type="button">开始</button>
      <button data-action="pause" type="button">暂停</button>
      <button data-action="resume" type="button">继续</button>
      <button data-action="stop" type="button">停止</button>
    </div>
    <div id="deviceStatus" style="margin-top:8px;color:#667085;min-height:1.4em">尚未生成 G-code</div>
  </section>
  <vector-gcode-editor></vector-gcode-editor>
  <script type="module">
    import './vector-gcode-editor.js';

    const editor = document.querySelector('vector-gcode-editor');
    const sendButton = document.querySelector('#sendJob');
    const deviceUrlLabel = document.querySelector('#deviceUrl');
    const statusLabel = document.querySelector('#deviceStatus');
    let latestCode = '';
    let busy = false;

    function setStatus(message, isError = false) {
      statusLabel.textContent = message;
      statusLabel.style.color = isError ? '#b42318' : '#667085';
    }

    async function request(path, options = {}) {
      const response = await fetch(path, { cache: 'no-store', ...options });
      const text = await response.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { error: text || response.statusText }; }
      if (!response.ok) throw new Error(data.error || response.statusText);
      return data;
    }

    function showDeviceStatus(data) {
      if (!data || !data.state) return;
      const location = data.ip && data.ip !== '0.0.0.0' ? `，IP ${data.ip}` : '';
      const progress = data.upload_percent != null ? `，上传 ${data.upload_percent}%` : '';
      const line = data.line ? `，第 ${data.line} 行` : '';
      setStatus(`设备状态：${data.state}${location}${progress}${line}${data.error ? `，${data.error}` : ''}`);
    }

    editor.addEventListener('gcode-generated', event => {
      latestCode = event.detail.code || '';
      sendButton.disabled = !latestCode || busy;
      setStatus(`已生成 ${latestCode.length} 个字符，可以发送到 ESP32`);
    });

    sendButton.addEventListener('click', async () => {
      if (!latestCode || busy) return;
      busy = true;
      sendButton.disabled = true;
      setStatus('正在上传 G-code...');
      try {
        const data = await request('/api/device/job', {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/octet-stream',
            'X-File-Name': 'vector-output.nc'
          },
          body: new Blob([latestCode], { type: 'application/octet-stream' })
        });
        showDeviceStatus(data);
      } catch (error) {
        setStatus(`上传失败：${error.message}`, true);
      } finally {
        busy = false;
        sendButton.disabled = !latestCode;
      }
    });

    document.querySelectorAll('[data-action]').forEach(button => {
      button.addEventListener('click', async () => {
        try {
          showDeviceStatus(await request(`/api/device/${button.dataset.action}`, { method: 'POST' }));
        } catch (error) {
          setStatus(`操作失败：${error.message}`, true);
        }
      });
    });

    async function refresh() {
      try {
        const config = await request('/api/device/config');
        deviceUrlLabel.textContent = `设备：${config.device_url}`;
        showDeviceStatus(await request('/api/device/status'));
      } catch (error) {
        setStatus(`设备连接失败：${error.message}`, true);
      }
    }

    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
